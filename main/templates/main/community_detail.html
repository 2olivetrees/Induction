{% extends 'main/base.html' %}
{% load static %}
{% block title %}{{ community.name }}{% endblock %}

{% block content %}
<h1>{{ community.name }}</h1>
{% if community.description %}
  <p>{{ community.description }}</p>
{% endif %}

<h2>Community Calendar</h2>
<div class="cal-wrap">

  <div class="cal-header">
    <div id="weekLabel" class="cal-title"></div>

    <div class="cal-nav">
      <button onclick="toggleView()">toggle view</button>
      <button onclick="changeWeek(-1)">← prev</button>
      <button onclick="changeWeek(0)">today</button>
      <button onclick="changeWeek(1)">next →</button>
      <button onclick="goToday()">Today</button>
    </div>
  </div>

  <div class="calendar">

    <!-- weekly view -->
    <div id="calendarHeader" class="calendar-header"></div>
    <div id="allDayGrid" class="all-day-grid"></div>

    <div id="calendarScroll">
        <div id="calendarBody" class="calendar-body"></div>
    </div>

    <!-- monthly view -->
    <div id="weekGrid" class="week-grid" style="display:none"></div>

  </div>

</div>
<div id="modal" style="display:none"></div>
<script>
window.COMMUNITY_ID = {{ community.id }};
</script>

<script src="{% static 'main/calendar_core.js' %}"></script>
<script src="{% static 'main/calendar_community.js' %}"></script>
{% endblock %}
