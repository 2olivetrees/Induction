{% extends 'main/base.html' %}
{% load static %}
{% block title %}Cosmos{% endblock %}

{% block content %}
<div class="cal-filters">
  <span class="filter-label">Show events from:</span>
  <button class="filter-btn active" data-community="personal" onclick="toggleFilter(this)">Personal</button>
  {% for community in communities %}
    <button class="filter-btn active" data-community="{{ community.id }}" onclick="toggleFilter(this)">{{ community.name }}</button>
  {% endfor %}
</div>
