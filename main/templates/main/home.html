{% extends 'main/base.html' %}
{% load static %}
{% block title %}Induction{% endblock %}

{% block content %}
<h1>Induction</h1>

<div class="cal-wrap">
  <div class="cal-header">
    <span class="cal-title" id="weekLabel"></span>
    <div class="cal-nav">
      <button onclick="changeWeek(-1)">← prev</button>
      <button onclick="changeWeek(0)">today</button>
      <button onclick="changeWeek(1)">next →</button>
    </div>
  </div>
  <div class="week-grid" id="weekGrid"></div>
</div>
<div id="modal" style="display:none"></div>

<script src="{% static 'main/calendar.js' %}"></script>
{% endblock %}
