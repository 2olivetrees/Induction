{% extends 'main/base.html' %}
{% load static %}
{% load widget_tweaks %}
{% block title %}Profile{% endblock %}

{% block content %}
<h1>Your Profile</h1>

<form method="post">
  {% csrf_token %}
  {% for field in form %}
    <div class="form-group">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {% render_field field %}
      {% if field.errors %}
        <div class="error">{{ field.errors }}</div>
      {% endif %}
    </div>
  {% endfor %}
  <button type="submit">Save</button>
</form>
{% endblock %}
